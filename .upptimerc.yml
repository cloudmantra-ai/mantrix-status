owner: cloudmantra-ai
repo: mantrix-status

sites:
  - name: Web App
    url: https://mantrix.cloudmantra.ai
    expectedStatusCodes: [200, 301, 302, 401, 403]
  - name: API
    url: https://mantrix.cloudmantra.ai/api/v1/health
    expectedStatusCodes: [200]

status-website:
  cname: status.mantrix.cloudmantra.ai
  logoUrl: https://raw.githubusercontent.com/cloudmantra-ai/mantrix-status/master/logo.svg
  name: Mantrix Status
  introTitle: "Mantrix Platform Status"
  introMessage: |
    Real-time and historical availability of the Mantrix platform. We monitor
    the **Web App** (the user-facing site) and the **API** (the backend that
    powers it) separately, so you can tell whether the page is broken or just
    the data behind it. Published from independent infrastructure
    (GitHub Pages + GitHub Actions), not hosted on the systems it monitors.
  navbar:
    - title: Status
      href: /
    - title: Mantrix
      href: https://mantrix.cloudmantra.ai
    - title: GitHub
      href: https://github.com/cloudmantra-ai/mantrix-status
  theme: light

# Probe every 5 minutes (GitHub Actions cron)
workflowSchedule:
  graphs: "0 0 * * *"
  responseTime: "0 23 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
  updates: "0 3 * * *"
  updateTemplate: "0 0 * * *"
  uptime: "*/5 * * * *"

# SOC2 evidence retention — every probe result is committed to git,
# providing an immutable, timestamped audit trail of availability.
